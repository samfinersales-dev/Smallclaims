name: Auto Blog Post Generator (v3)

on:
  schedule:
    - cron: '0 8 * * 2,4'  # Every Monday and Thursday at 8am UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify blog-config.json exists
        run: |
          if [ ! -f blog-config.json ]; then
            echo "::error::blog-config.json not found in repo root. Cannot generate blog post."
            exit 1
          fi
          echo "Config found:"
          cat blog-config.json | head -20

      - name: Copy blog generator to repo root
        run: cp .github/scripts/generate-blog-post.js ./generate-blog-post.js

      - name: Run blog generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETLIFY_HOOK:      ${{ secrets.NETLIFY_HOOK }}
        run: node generate-blog-post.js

      - name: Cleanup
        run: rm -f generate-blog-post.js
